<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#1a1b23"/>
  <!-- D spine -->
  <line x1="9" y1="7" x2="9" y2="25" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- D curve -->
  <path d="M9,7 C17,7 23,11 23,16 C23,21 17,25 9,25" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- primary anchor dots -->
  <circle cx="9"  cy="7"  r="2.5" fill="#3b82f6"/>
  <circle cx="9"  cy="25" r="2.5" fill="#3b82f6"/>
  <circle cx="23" cy="16" r="2.5" fill="#3b82f6"/>
  <!-- secondary dots on curve -->
  <circle cx="18" cy="8"  r="1.5" fill="#60a5fa"/>
  <circle cx="18" cy="24" r="1.5" fill="#60a5fa"/>
</svg>
